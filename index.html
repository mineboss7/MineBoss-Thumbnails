<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Commissions</title>

<!-- Pixel / Minecraft-style font -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
/* Add pixel Arabic font */
@font-face {
    font-family: 'PixelArabic';
    src: url('PixeloArabic.ttf') format('truetype');
}

/* Main body */
body {
    font-family: 'Press Start 2P', monospace;
    margin: 0;
    padding: 0;
    background: #0d1117;
    color: #fff;
    overflow-x: hidden;
    position: relative;
}

/* Header */
header {
    width: 100%;
    background: linear-gradient(to right, #1b2735, #090a0f);
    padding: 40px 0;
    text-align: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.5);
}

header h1 {
    margin: 0;
    font-size: 2em;
}

header .subtitle {
    font-family: 'PixelArabic', monospace; /* Pixelated Arabic font */
    font-size: 28px;
    margin-top: 10px;
    color: #99aab5;
    text-shadow: 1px 1px 2px #000;
}

/* MB logo overlay bottom-right */
.logo {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-family: fantasy;
    font-size: 2em;
    font-weight: bold;
    color: #fff8ff;
    opacity: 1;
    text-shadow: 1px 1px 3px #000;
}

/* Floating background cubes/pixels */
.cube {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #00ffe0; /* bright cyan */
    opacity: 0.5;
    border-radius: 1px;
    animation: float 6s infinite alternate;
}
@keyframes float {
    0% {transform: translate(0,0);}
    50% {transform: translate(10px,-20px);}
    100% {transform: translate(0,0);}
}

/* Thumbnails grid: 4 per row */
.thumbnails {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 25px;
    padding: 30px;
    justify-items: center;
}

/* Thumbnail cards */
.thumb-card {
    width: 280px; /* bigger thumbnails */
    cursor: pointer;
    overflow: hidden;
    border-radius: 10px; /* subtle rounded corners */
    border: 3px solid #00ffe0; /* bright cyan */
    transition: transform 0.3s, box-shadow 0.3s;
    image-rendering: pixelated;
}
.thumb-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00ffe0; /* bright cyan glow */
}
.thumb-card img {
    width: 100%;
    height: 100%;
    display: block;
    border-radius: 10px;
    image-rendering: pixelated;
}

/* Commission button */
.commission-btn {
    display: block;
    margin: 30px auto;
    padding: 15px 30px;
    font-size: 16px;
    background: linear-gradient(to right, #00ffe0, #1de9b6);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s, transform 0.3s;
    text-shadow: 1px 1px #000;
}
.commission-btn:hover {
    background: linear-gradient(to right, #1de9b6, #00ffe0);
    transform: scale(1.05);
}

/* Popup */
.popup {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background-color: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
.popup-content {
    background-color: #2c2f33;
    padding: 25px;
    border-radius: 15px;
    width: 400px;
    max-width: 90%;
    color: #fff;
    text-align: left;
    animation: fadeScale 0.3s ease-in-out;
}
@keyframes fadeScale {
    0% {opacity:0; transform: scale(0.7);}
    100% {opacity:1; transform: scale(1);}
}
.popup-content input, 
.popup-content textarea {
    width: 100%;
    margin: 8px 0;
    padding: 8px;
    border-radius: 5px;
    border: none;
    font-family: 'Press Start 2P', monospace;
}

/* Buttons in popup */
.popup-content button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    background: linear-gradient(to right, #00ffe0, #1de9b6);
    color: #fff;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.3s, transform 0.3s;
}
.popup-content button:hover {
    background: linear-gradient(to right, #1de9b6, #00ffe0);
    transform: scale(1.05);
}
.popup-content .cancel-btn {
    background: linear-gradient(to right, #ff5555, #b93b3b);
    margin-top: 5px;
}
.popup-content .cancel-btn:hover {
    background: linear-gradient(to right, #b93b3b, #ff5555);
}

/* Lightbox */
.lightbox {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background-color: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    z-index: 2000;
}
.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border: 5px solid #00ffe0;
    border-radius: 10px;
    image-rendering: pixelated;
}
.lightbox span {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    cursor: pointer;
    color: #fff;
}

/* Progress bar Minecraft-style */
.progress-container {
    width: 100%;
    background-color: #1b2735;
    border: 2px solid #00ffe0;
    border-radius: 5px;
    margin: 10px 0;
}
.progress-bar {
    width: 0%;
    height: 16px;
    background: linear-gradient(to right, #00ffe0, #1de9b6);
    border-radius: 3px;
    text-align: center;
    font-size: 12px;
    color: #000;
    font-family: 'Press Start 2P', monospace;
}
</style>
</head>
<body>

<header>
    <h1>Minecraft Thumbnails Showcase</h1>
    <h2 class="subtitle"> صور مصغرة </h2>
</header>

<section class="thumbnails">
    <div class="thumb-card"><img src="thumbnail1.jpg" alt="Thumbnail 1"></div>
    <div class="thumb-card"><img src="thumbnail2.jpg" alt="Thumbnail 2"></div>
    <div class="thumb-card"><img src="thumbnail3.jpg" alt="Thumbnail 3"></div>
    <div class="thumb-card"><img src="thumbnail4.jpg" alt="Thumbnail 4"></div>
    <div class="thumb-card"><img src="thumbnail5.jpg" alt="Thumbnail 5"></div>
    <div class="thumb-card"><img src="thumbnail6.jpg" alt="Thumbnail 6"></div>
    <div class="thumb-card"><img src="thumbnail7.jpg" alt="Thumbnail 7"></div>
    <div class="thumb-card"><img src="thumbnail8.jpg" alt="Thumbnail 8"></div>
</section>

<button class="commission-btn" onclick="openPopup()">Request Commission</button>

<div class="popup" id="commissionPopup">
    <div class="popup-content">
        <h2>Commission Request</h2>
        <form id="commissionForm">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="text" name="minecraft" placeholder="Minecraft Username" required>
            <input type="text" name="title" placeholder="Title of the Video" required>
            <textarea name="idea" placeholder="Idea for the Thumbnail" rows="3" required></textarea>
            <input type="file" name="skinFile" accept=".png,.jpg,.jpeg,.mcskin,.zip" required>
            <input type="text" name="discord" placeholder="Your Discord Username" required>
            <input type="date" name="deadline" required>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            <button type="submit">Send Request</button>
            <button type="button" class="cancel-btn" onclick="closePopup()">Cancel</button>
        </form>
    </div>
</div>

<div class="lightbox" id="lightbox">
    <span onclick="closeLightbox()">&times;</span>
    <img src="" alt="Preview">
</div>

<!-- MB Logo overlay -->
<div class="logo">MB</div>

<script>
// Floating cubes background
for(let i=0;i<80;i++){ // more cubes
    const cube = document.createElement('div');
    cube.className='cube';
    cube.style.top=Math.random()*100+'%';
    cube.style.left=Math.random()*100+'%';
    cube.style.width = (4 + Math.random()*4) + 'px';
    cube.style.height = cube.style.width;
    cube.style.opacity = 0.2 + Math.random()*0.5;
    cube.style.animationDuration=(3+Math.random()*3)+'s';
    document.body.appendChild(cube);
}

const popup = document.getElementById('commissionPopup');
const form = document.getElementById('commissionForm');
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');
const progressBar = document.getElementById('progressBar');

// Replace with your Discord webhook URL
const webhookURL = "https://discord.com/api/webhooks/1457879248911077551/S-Thxp79dkW9ovPgSSaogGUYeGGiyIPhoewBiJvRUkM5dIY1BMBSJgRdOpb2LWL1W978";

function openPopup(){ popup.style.display = "flex"; }
function closePopup(){ popup.style.display = "none"; }
function openLightbox(src){ lightbox.style.display = "flex"; lightboxImg.src = src; }
function closeLightbox(){ lightbox.style.display = "none"; }

document.querySelectorAll('.thumb-card img').forEach(img=>{
    img.addEventListener('click', ()=> {
        openLightbox(img.src);
        new Audio('hover.mp3').play();
    });
});

form.addEventListener('submit', async e=>{
    e.preventDefault();
    const formData = new FormData(form);
    const file = formData.get('skinFile');

    const data = new FormData();
    data.append("file", file);
    data.append("payload_json", JSON.stringify({
        content: `**New Commission Request!**
Name: ${formData.get('name')}
Minecraft: ${formData.get('minecraft')}
Title: ${formData.get('title')}
Idea: ${formData.get('idea')}
Discord: ${formData.get('discord')}
Deadline: ${formData.get('deadline')}`
    }));

    const xhr = new XMLHttpRequest();
    xhr.open("POST", webhookURL, true);

    xhr.upload.onprogress = function(e){
        if(e.lengthComputable){
            let percent = Math.floor((e.loaded / e.total) * 100);
            progressBar.style.width = percent + "%";
            progressBar.textContent = percent + "%";
        }
    };

    xhr.onload = function(){
        alert("Your commission request has been sent! ✅");
        form.reset();
        progressBar.style.width = "0%";
        progressBar.textContent = "0%";
        closePopup();
        new Audio('send.mp3').play();
    };

    xhr.send(data);
});
</script>
</body>
</html>
